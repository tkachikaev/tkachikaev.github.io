name: Apply stage 1 refactor

on:
  push:
    paths:
      - "scripts/apply_stage1_refactor.py"
      - ".github/workflows/apply-stage1-refactor.yml"

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply refactor
        run: python scripts/apply_stage1_refactor.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "refactor: extract inline stage 1 code"
          git push
